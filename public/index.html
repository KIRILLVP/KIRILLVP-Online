<!DOCTYPE html>
<html>
<head>
    <title>KIRILLVP Online</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 10; text-shadow: 1px 1px 2px black; }
        #online-count { font-size: 20px; font-weight: bold; color: #00ff00; margin-bottom: 5px; }
        #death-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff4444; font-size: 80px; font-weight: bold; display: none; text-shadow: 0 0 20px black; z-index: 20; }
    </style>
</head>
<body>
    <audio id="bgMusic" loop><source src="Funny-Pluck.mp3" type="audio/mpeg"></audio>
    <audio id="shotSound"><source src="shot.mp3" type="audio/mpeg"></audio>
    <audio id="damageSound"><source src="damage.mp3" type="audio/mpeg"></audio>

    <div id="ui">
        <div id="online-count">Online: 0</div>
        <div id="controls-hint">WASD - Move | MOUSE - Shoot</div>
    </div>
    <div id="death-screen">YOU DIED</div>
    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io({ transports: ['websocket'] });
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const deathScreen = document.getElementById('death-screen');
        const onlineDisplay = document.getElementById('online-count');
        
        const bgMusic = document.getElementById('bgMusic');
        const shotSound = document.getElementById('shotSound');
        const damageSound = document.getElementById('damageSound');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let players = {}; 
        let bullets = [];
        let obstacles = [];
        let MAP_SIZE = 2000;
        let mousePos = { x: 0, y: 0 };
        const keys = {};

        bgMusic.volume = 0.2;
        shotSound.volume = 0.4;
        damageSound.volume = 0.5;

        // Звуки разблокируются по клику
        const unlockAudio = () => { bgMusic.play().catch(() => {}); window.removeEventListener('mousedown', unlockAudio); };
        window.addEventListener('mousedown', unlockAudio);

        socket.on('init', (data) => { obstacles = data.obstacles; MAP_SIZE = data.mapSize; });
        socket.on('updateOnline', (count) => { onlineDisplay.innerText = 'Online: ' + count; });
        
        socket.on('update', (data) => { 
            for (let id in data.players) {
                const sP = data.players[id];
                if (!players[id]) {
                    players[id] = { ...sP, targetX: sP.x, targetY: sP.y };
                } else {
                    // Для себя мы используем более мягкое сглаживание, чтобы не "дергало" назад
                    if (id === socket.id) {
                        players[id].targetX = sP.x;
                        players[id].targetY = sP.y;
                    } else {
                        players[id].targetX = sP.x;
                        players[id].targetY = sP.y;
                    }
                    players[id].hp = sP.hp;
                    players[id].dead = sP.dead;
                    players[id].color = sP.color;
                    players[id].name = sP.name;
                }
            }
            for (let id in players) { if (!data.players[id]) delete players[id]; }
            bullets = data.bullets; 
            if (players[socket.id]) deathScreen.style.display = players[socket.id].dead ? 'block' : 'none';
        });

        socket.on('hitEffect', (data) => {
            if (data.victimId === socket.id || data.attackerId === socket.id) {
                damageSound.currentTime = 0; damageSound.play().catch(() => {});
            }
        });

        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });
        window.addEventListener('mousemove', (e) => { mousePos.x = e.clientX; mousePos.y = e.clientY; });
        
        window.addEventListener('mousedown', () => {
            const me = players[socket.id];
            if (!me || me.dead) return;
            shotSound.currentTime = 0; shotSound.play().catch(() => {});
            const camX = me.x - canvas.width / 2;
            const camY = me.y - canvas.height / 2;
            socket.emit('shoot', { x: mousePos.x + camX, y: mousePos.y + camY });
        });

        function draw() {
            const me = players[socket.id];
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (me) {
                // ПРЕДСКАЗАНИЕ ДЛЯ СЕБЯ (Client Prediction)
                let vx = 0, vy = 0;
                if (keys['KeyW']) vy -= 1; if (keys['KeyS']) vy += 1;
                if (keys['KeyA']) vx -= 1; if (keys['KeyD']) vx += 1;
                
                if ((vx !== 0 || vy !== 0) && !me.dead) {
                    const speed = 5;
                    const len = Math.sqrt(vx * vx + vy * vy);
                    const dx = (vx / len) * speed;
                    const dy = (vy / len) * speed;
                    
                    // Простая проверка столкновений на клиенте для плавности
                    if (!obstacles.some(o => me.x + dx < o.x + o.w && me.x + dx + 40 > o.x && me.y < o.y + o.h && me.y + 40 > o.y)) me.x += dx;
                    if (!obstacles.some(o => me.x < o.x + o.w && me.x + 40 > o.x && me.y + dy < o.y + o.h && me.y + dy + 40 > o.y)) me.y += dy;
                    
                    socket.emit('move', { x: vx, y: vy });
                }

                // ПЛАВНАЯ КОРРЕКЦИЯ ОТ СЕРВЕРА
                for (let id in players) {
                    let p = players[id];
                    if (id !== socket.id) {
                        // Другие игроки: плавный LERP
                        p.x += (p.targetX - p.x) * 0.25;
                        p.y += (p.targetY - p.y) * 0.25;
                    } else {
                        // Ты сам: очень мягкая коррекция, чтобы не было рывков назад
                        const dist = Math.sqrt((p.targetX - p.x)**2 + (p.targetY - p.y)**2);
                        if (dist > 50) { // Если рассинхрон слишком большой — телепортируем
                            p.x = p.targetX; p.y = p.targetY;
                        } else {
                            p.x += (p.targetX - p.x) * 0.1;
                            p.y += (p.targetY - p.y) * 0.1;
                        }
                    }
                }

                const camX = Math.floor(me.x - canvas.width / 2);
                const camY = Math.floor(me.y - canvas.height / 2);

                ctx.save();
                ctx.translate(-camX, -camY);

                // Сетка
                ctx.strokeStyle = '#222';
                for(let i=0; i<=MAP_SIZE; i+=100) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, MAP_SIZE); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(MAP_SIZE, i); ctx.stroke();
                }

                // Препятствия
                ctx.fillStyle = '#444';
                obstacles.forEach(o => { ctx.fillRect(o.x, o.y, o.w, o.h); ctx.strokeRect(o.x, o.y, o.w, o.h); });

                // Пули
                ctx.fillStyle = '#ffff00';
                bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill(); });

                // Игроки
                for (let id in players) {
                    const p = players[id];
                    if (p.dead) continue;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 40, 40);
                    ctx.strokeStyle = (id === socket.id) ? '#fff' : '#000';
                    ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, 40, 40);
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center';
                    ctx.fillText(p.name, p.x + 20, p.y - 25);
                    ctx.fillStyle = '#ff0000'; ctx.fillRect(p.x, p.y - 15, 40, 6);
                    ctx.fillStyle = '#00ff00'; ctx.fillRect(p.x, p.y - 15, (p.hp / 3) * 40, 6);
                }
                ctx.restore();

                // Прицел
                ctx.strokeStyle = '#0f0'; ctx.lineWidth = 2; ctx.beginPath();
                ctx.moveTo(mousePos.x - 15, mousePos.y); ctx.lineTo(mousePos.x + 15, mousePos.y);
                ctx.moveTo(mousePos.x, mousePos.y - 15); ctx.lineTo(mousePos.x, mousePos.y + 15); ctx.stroke();
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
